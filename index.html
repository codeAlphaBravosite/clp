<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CutMark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --bg:#080808;--surface:#101010;--card:#161616;
  --border:#1e1e1e;--border2:#2a2a2a;
  --accent:#F08B0E;--accent-dim:rgba(240,139,14,.11);
  --text:#f0efe8;--text2:#858480;--text3:#484845;--danger:#d95454;
  --green:#3ecf6a;--green-dim:rgba(62,207,106,.12);
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --font-ui:'Syne',sans-serif;--font-mono:'DM Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui);-webkit-font-smoothing:antialiased}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;will-change:opacity,transform;transition:opacity .3s cubic-bezier(.4,0,.2,1),transform .3s cubic-bezier(.4,0,.2,1)}
.screen.active{opacity:1;pointer-events:all;transform:none!important}

/* ── Upload ─────────────────────────── */
#screen-upload{align-items:center;justify-content:center;gap:14px;padding:20px;padding-top:calc(var(--safe-top)+20px)}
.logo-mark{position:absolute;top:calc(var(--safe-top)+16px);left:18px;font-size:14px;font-weight:800;letter-spacing:.1em;color:var(--accent)}

/* Resume banner */
.resume-card{
  width:100%;max-width:360px;
  background:var(--card);border:1px solid var(--border2);
  border-left:3px solid var(--accent);
  border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
}
.resume-card.hidden{display:none}
.resume-icon{font-size:20px;flex-shrink:0}
.resume-body{flex:1;min-width:0}
.resume-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.resume-sub{font-size:10px;color:var(--text2);font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.resume-dismiss{width:28px;height:28px;border-radius:50%;background:transparent;border:none;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:color .12s}
.resume-dismiss:active{color:var(--danger)}

.upload-card{width:100%;max-width:360px;border:1.5px dashed var(--border2);border-radius:24px;padding:44px 28px 36px;text-align:center;cursor:pointer;position:relative;overflow:hidden;background:var(--surface);transition:border-color .2s,background .2s,transform .12s;user-select:none}
.upload-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 110%,rgba(240,139,14,.08),transparent);pointer-events:none}
.upload-card.over{border-color:var(--accent);background:var(--accent-dim)}
.upload-card:active{transform:scale(.977)}
.film-icon{margin:0 auto 22px;width:56px;height:56px}
.film-icon svg{width:100%;height:100%}
.up-title{font-size:19px;font-weight:700;margin-bottom:7px}
.up-sub{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:20px}
.pick-btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#000;font-family:var(--font-ui);font-size:13px;font-weight:700;padding:12px 24px;border-radius:100px;border:none;cursor:pointer;letter-spacing:.04em;transition:transform .12s,opacity .15s;touch-action:manipulation}
.pick-btn:active{transform:scale(.94);opacity:.82}
.fmt-hint{margin-top:16px;font-size:10px;font-family:var(--font-mono);color:var(--text3);letter-spacing:.05em}
#file-input{display:none}

/* ── Player ─────────────────────────── */
#screen-player{overflow:hidden}
#screen-player.entering{transform:translateY(26px)}

.topbar{display:flex;align-items:center;gap:10px;padding:9px 14px 7px;padding-top:calc(var(--safe-top)+9px);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-logo{font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--accent);flex-shrink:0}
.topbar-file{flex:1;font-size:10.5px;color:var(--text2);font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-fps{font-size:9.5px;font-family:var(--font-mono);color:var(--text3);background:var(--card);border:1px solid var(--border2);padding:3px 6px;border-radius:4px;flex-shrink:0;white-space:nowrap}
.exp-btn{display:flex;align-items:center;gap:5px;flex-shrink:0;background:var(--accent);color:#000;font-family:var(--font-ui);font-size:11px;font-weight:700;padding:7px 12px;border-radius:100px;border:none;cursor:pointer;letter-spacing:.04em;white-space:nowrap;transition:transform .12s,opacity .15s;touch-action:manipulation}
.exp-btn:active{transform:scale(.93);opacity:.82}

/* Video */
.video-wrap{flex-shrink:0;background:#000;position:relative;overflow:hidden;user-select:none}
.video-wrap video{display:block;width:100%;height:100%;object-fit:contain}
.tap-layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.play-flash{width:54px;height:54px;border-radius:50%;background:rgba(0,0,0,.54);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none}
.play-flash.pop{animation:fp .4s ease forwards}
@keyframes fp{0%{opacity:.9;transform:scale(.8)}55%{opacity:.7;transform:scale(1.07)}100%{opacity:0;transform:scale(1)}}

/* Preview bar (shows when clip preview is active) */
.preview-bar{
  flex-shrink:0;height:0;overflow:hidden;
  background:var(--green-dim);border-bottom:1px solid transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-family:var(--font-mono);color:var(--green);
  letter-spacing:.04em;gap:8px;
  transition:height .2s,border-color .2s;
}
.preview-bar.active{height:28px;border-color:rgba(62,207,106,.2)}
.preview-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pdot 1s ease-in-out infinite}
@keyframes pdot{0%,100%{opacity:.3}50%{opacity:1}}

/* Timeline */
.tl-row{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:9px 14px 3px}
.tl-time{font-family:var(--font-mono);font-size:12px;flex-shrink:0;min-width:64px}
.tl-time.right{text-align:right;color:var(--text2);font-size:11px}
.tl-wrap{flex:1;position:relative;padding:12px 0;touch-action:none;cursor:pointer}
.tl-track{width:100%;height:5px;background:var(--border2);border-radius:3px;position:relative;overflow:visible}
.tl-fill{position:absolute;left:0;top:0;height:100%;background:var(--accent);border-radius:3px;pointer-events:none}
.tl-preview-fill{position:absolute;top:0;height:100%;background:var(--green);border-radius:3px;opacity:.45;pointer-events:none}
.tl-thumb{position:absolute;top:50%;width:16px;height:16px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 4px rgba(240,139,14,.18)}
.tl-notch{position:absolute;top:50%;width:2.5px;height:14px;border-radius:1.5px;background:#fff;opacity:.6;transform:translate(-50%,-50%);pointer-events:none}

/* Transport — clean, label-free */
.transport{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:5px 14px 7px}
.tc{display:flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:50%;border:1px solid var(--border2);background:var(--card);color:var(--text);flex-shrink:0;cursor:pointer;transition:background .1s,transform .1s;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.tc:active{transform:scale(.86);background:var(--surface)}
.tc svg{width:20px;height:20px;pointer-events:none}
.tc.play{width:56px;height:56px;background:var(--text);color:var(--bg);border-color:transparent}
.tc.play:active{background:#ccc;transform:scale(.9)}
.tc.play svg{width:22px;height:22px}

/* Speed select */
.speed-wrap{position:relative;flex-shrink:0}
.speed-select{
  height:40px;padding:0 10px;
  background:var(--card);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);
  font-family:var(--font-mono);font-size:13px;font-weight:500;
  cursor:pointer;appearance:none;-webkit-appearance:none;
  padding-right:24px;
  transition:border-color .12s;
  touch-action:manipulation;
}
.speed-select:focus{outline:none;border-color:var(--accent)}
.speed-select.fast{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.speed-arrow{position:absolute;right:7px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text3)}
.speed-arrow svg{width:10px;height:10px}

/* Mark button */
.mark-wrap{flex-shrink:0;padding:3px 14px 5px}
.mark-btn{width:100%;height:60px;border-radius:16px;border:none;cursor:pointer;background:var(--accent);font-family:var(--font-ui);font-size:18px;font-weight:800;color:#000;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden;transition:transform .1s,filter .1s;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.mark-btn:active{transform:scale(.975);filter:brightness(.85)}
.mark-btn.pulse{animation:mpulse .26s ease}
@keyframes mpulse{0%{transform:scale(1)}40%{transform:scale(.963)}80%{transform:scale(1.012)}100%{transform:scale(1)}}
.mark-ripple{position:absolute;border-radius:50%;background:rgba(0,0,0,.16);pointer-events:none;animation:mripple .48s ease-out forwards}
@keyframes mripple{from{transform:scale(0);opacity:.7}to{transform:scale(3.5);opacity:0}}
.mark-kb{position:absolute;right:16px;font-size:9px;font-family:var(--font-mono);color:rgba(0,0,0,.28);letter-spacing:.05em}

/* Clips */
.clips-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:6px 14px 4px;border-top:1px solid var(--border)}
.clips-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.clips-badge{font-family:var(--font-mono);font-size:10px;color:var(--accent);background:var(--accent-dim);padding:2px 9px;border-radius:100px;font-weight:500}
.clips-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.clips-scroll::-webkit-scrollbar{width:2px}
.clips-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:1px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80px;padding:18px 24px;gap:5px;color:var(--text3);font-size:12px;text-align:center;line-height:1.5}
.empty-icon{font-size:20px;opacity:.3;margin-bottom:2px}

/* Clip rows */
.clip-row{display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);min-height:50px;transition:background .1s}
.clip-row.previewing{background:var(--green-dim)}
.clip-row:active{background:var(--surface)}
.clip-main{flex:1;display:flex;align-items:center;gap:10px;padding:9px 0;cursor:pointer;min-width:0;touch-action:manipulation}
.clip-num{font-family:var(--font-mono);font-size:10px;color:var(--text3);flex-shrink:0;width:18px}
.clip-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.clip-time{font-family:var(--font-mono);font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clip-dur{font-family:var(--font-mono);font-size:10px;color:var(--text3)}
.clip-play-icon{width:18px;height:18px;flex-shrink:0;color:var(--text3)}
.clip-del{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:background .1s,color .1s;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.clip-del:active{background:rgba(217,84,84,.14);color:var(--danger)}
.clip-del svg{width:14px;height:14px;pointer-events:none}

/* Bottom bar */
.bottom-bar{flex-shrink:0;display:flex;gap:8px;padding:7px 14px calc(7px + var(--safe-bot));border-top:1px solid var(--border)}
.bottom-btn{flex:1;height:40px;border-radius:10px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .1s,color .1s;touch-action:manipulation}
.bottom-btn:active{background:var(--surface);color:var(--text)}
.bottom-btn:disabled{opacity:.25;pointer-events:none}
.bottom-btn svg{width:13px;height:13px;flex-shrink:0}

/* Saved indicator in topbar */
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;opacity:0;transition:opacity .3s}
.save-dot.visible{opacity:1}

/* Export modal */
#modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
#modal.open{opacity:1;pointer-events:all}
.modal-sheet{width:100%;max-height:82vh;background:var(--surface);border-radius:22px 22px 0 0;border-top:1px solid var(--border2);border-left:1px solid var(--border2);border-right:1px solid var(--border2);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,0,.15,1);overflow:hidden;padding-bottom:var(--safe-bot)}
#modal.open .modal-sheet{transform:none}
.modal-drag{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:11px auto 0;flex-shrink:0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:11px 18px 9px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-stats{font-size:10px;font-family:var(--font-mono);color:var(--text3)}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--card);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .1s;touch-action:manipulation}
.modal-close:active{background:var(--border2)}
.modal-close svg{width:13px;height:13px;pointer-events:none}
.json-box{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:12px 18px;font-family:var(--font-mono);font-size:10.5px;line-height:1.85;color:var(--text2);white-space:pre}
.jk{color:#7ec8e3}.js{color:#b5d4a0}.jn{color:#f0935a}.jb{color:#b39ddb}
.modal-actions{padding:10px 18px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.act-btn{width:100%;height:48px;border-radius:12px;border:none;cursor:pointer;font-family:var(--font-ui);font-size:14px;font-weight:700;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s,filter .12s;touch-action:manipulation}
.act-btn:active{transform:scale(.97);filter:brightness(.86)}
.act-btn svg{width:14px;height:14px;flex-shrink:0}
.act-primary{background:var(--accent);color:#000}
.act-secondary{background:var(--card);border:1px solid var(--border2);color:var(--text)}

/* Toast */
#toast{position:fixed;z-index:300;top:calc(var(--safe-top)+58px);left:50%;transform:translateX(-50%) translateY(-6px);background:var(--text);color:var(--bg);font-family:var(--font-ui);font-size:11.5px;font-weight:700;padding:9px 17px;border-radius:100px;letter-spacing:.03em;opacity:0;pointer-events:none;transition:opacity .16s,transform .16s;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:600px){
  #modal{align-items:center}
  .modal-sheet{max-width:520px;margin:0 auto;border-radius:22px;padding-bottom:0;border:1px solid var(--border2)}
  .modal-drag{display:none}
}
@media(max-height:640px){
  .mark-btn{height:50px;font-size:15px}
  .tc{width:42px;height:42px}
  .tc.play{width:52px;height:52px}
  .transport{gap:6px;padding:3px 14px 5px}
  .tl-row{padding:7px 14px 2px}
  .clips-header{padding:4px 14px 3px}
}
</style>
</head>
<body>

<!-- ═══ UPLOAD ═══ -->
<div id="screen-upload" class="screen active">
  <div class="logo-mark">CUTMARK</div>

  <!-- Resume session banner -->
  <div class="resume-card hidden" id="resume-card">
    <div class="resume-icon">&#128190;</div>
    <div class="resume-body">
      <div class="resume-title">Resume previous session</div>
      <div class="resume-sub" id="resume-sub">Loading...</div>
    </div>
    <button class="resume-dismiss" onclick="dismissRestore()" title="Clear saved session">&#215;</button>
  </div>

  <div class="upload-card" id="upload-card">
    <div class="film-icon">
      <svg viewBox="0 0 60 60" fill="none">
        <rect x="3" y="11" width="54" height="38" rx="5" fill="#141414" stroke="#2a2a2a" stroke-width="1.5"/>
        <rect x="3" y="11" width="9" height="38" rx="3" fill="#141414" stroke="#2a2a2a" stroke-width="1.5"/>
        <rect x="48" y="11" width="9" height="38" rx="3" fill="#141414" stroke="#2a2a2a" stroke-width="1.5"/>
        <rect x="5.5" y="16" width="4" height="3.5" rx="1" fill="#F08B0E" opacity=".75"/>
        <rect x="5.5" y="23" width="4" height="3.5" rx="1" fill="#F08B0E" opacity=".75"/>
        <rect x="5.5" y="30" width="4" height="3.5" rx="1" fill="#F08B0E" opacity=".75"/>
        <rect x="5.5" y="37" width="4" height="3.5" rx="1" fill="#F08B0E" opacity=".75"/>
        <rect x="50.5" y="16" width="4" height="3.5" rx="1" fill="#F08B0E" opacity=".75"/>
        <rect x="50.5" y="23" width="4" height="3.5" rx="1" fill="#F08B0E" opacity=".75"/>
        <rect x="50.5" y="30" width="4" height="3.5" rx="1" fill="#F08B0E" opacity=".75"/>
        <rect x="50.5" y="37" width="4" height="3.5" rx="1" fill="#F08B0E" opacity=".75"/>
        <path d="M26 22l12 8-12 8V22z" fill="#F08B0E" opacity=".9"/>
      </svg>
    </div>
    <div class="up-title">Drop your video</div>
    <div class="up-sub">Tap to browse &middot; drag &amp; drop<br>Mark cuts manually as you watch</div>
    <button class="pick-btn" onclick="fileInput.click()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v9M4 7l4-5 4 5M2 13h12" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Choose Video
    </button>
    <div class="fmt-hint">MP4 &middot; MOV &middot; AVI &middot; WEBM &middot; MKV</div>
    <input type="file" id="file-input" accept="video/*">
  </div>
</div>

<!-- ═══ PLAYER ═══ -->
<div id="screen-player" class="screen">

  <div class="topbar">
    <div class="topbar-logo">CUTMARK</div>
    <div class="topbar-file" id="topbar-file">&mdash;</div>
    <div class="save-dot" id="save-dot" title="Session saved"></div>
    <div class="topbar-fps" id="fps-badge">&mdash;</div>
    <button class="exp-btn" onclick="openExport()">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M2 10v3a1 1 0 001 1h10a1 1 0 001-1v-3M8 2v8M5 5l3-3 3 3" stroke="#000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Export
    </button>
  </div>

  <div class="video-wrap" id="video-wrap">
    <video id="video" playsinline webkit-playsinline preload="metadata" x-webkit-airplay="allow"></video>
    <div class="tap-layer" id="tap-layer">
      <div class="play-flash" id="play-flash">
        <svg id="flash-icon" width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>
  </div>

  <!-- Preview bar -->
  <div class="preview-bar" id="preview-bar">
    <div class="preview-dot"></div>
    <span id="preview-label">Previewing clip</span>
  </div>

  <!-- Timeline -->
  <div class="tl-row">
    <div class="tl-time" id="time-cur">00:00.000</div>
    <div class="tl-wrap" id="tl-wrap">
      <div class="tl-track" id="tl-track">
        <div class="tl-fill" id="tl-fill" style="width:0%"></div>
        <div class="tl-preview-fill" id="tl-pfill" style="display:none"></div>
        <div class="tl-thumb" id="tl-thumb" style="left:0%"></div>
      </div>
    </div>
    <div class="tl-time right" id="time-dur">00:00.000</div>
  </div>

  <!-- Transport: ←1s | ←1f | ▶ | 1f→ | 1s→ | speed -->
  <div class="transport">
    <button class="tc" onclick="seek(-1)" title="Back 1s (&#8592;)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
        <line x1="9" y1="12" x2="20" y2="12"/>
        <text x="3" y="22" font-size="6" font-weight="700" font-family="sans-serif" fill="currentColor" stroke="none">1s</text>
      </svg>
    </button>
    <button class="tc" onclick="stepFrame(-1)" title="Prev frame (,)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="tc play" id="play-btn" onclick="togglePlay()">
      <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="tc" onclick="stepFrame(1)" title="Next frame (.)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg>
    </button>
    <button class="tc" onclick="seek(1)" title="Forward 1s (&#8594;)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
        <line x1="15" y1="12" x2="4" y2="12"/>
        <text x="15" y="22" font-size="6" font-weight="700" font-family="sans-serif" fill="currentColor" stroke="none">1s</text>
      </svg>
    </button>
    <div class="speed-wrap">
      <select class="speed-select" id="speed-select" onchange="onSpeedChange(this)">
        <option value="0.1">0.1&times;</option>
        <option value="0.25">0.25&times;</option>
        <option value="0.5">0.5&times;</option>
        <option value="0.75">0.75&times;</option>
        <option value="1" selected>1&times;</option>
        <option value="1.25">1.25&times;</option>
        <option value="1.5">1.5&times;</option>
        <option value="2">2&times;</option>
      </select>
      <div class="speed-arrow">
        <svg viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>

  <!-- Mark Cut -->
  <div class="mark-wrap">
    <button class="mark-btn" id="mark-btn" onclick="markCut(event)">
      <span style="font-size:17px;pointer-events:none">&#9986;</span>
      Mark Cut Here
      <span class="mark-kb" id="kb-hint">press M</span>
    </button>
  </div>

  <!-- Clips header -->
  <div class="clips-header">
    <span class="clips-label">Clips</span>
    <span class="clips-badge" id="clips-badge">1 clip</span>
  </div>

  <!-- Clips list -->
  <div class="clips-scroll" id="clips-scroll">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">&#9986;</div>
      Play and tap <strong>Mark Cut Here</strong><br>at each scene change
    </div>
    <div id="clips-list"></div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <button class="bottom-btn" id="undo-btn" onclick="undoLast()" disabled>
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 6h7a4 4 0 110 8H5M2 6l3-3M2 6l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Undo last
    </button>
    <button class="bottom-btn" onclick="resetToUpload()">
      <svg viewBox="0 0 16 16" fill="none"><path d="M13 8A5 5 0 113 5M3 2v3h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      New video
    </button>
  </div>
</div>

<!-- ═══ EXPORT MODAL ═══ -->
<div id="modal" onclick="modalBgClose(event)">
  <div class="modal-sheet">
    <div class="modal-drag"></div>
    <div class="modal-head">
      <div>
        <div class="modal-title">Export JSON</div>
        <div class="modal-stats" id="modal-stats"></div>
      </div>
      <button class="modal-close" onclick="closeExport()">
        <svg viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="json-box" id="json-box"></div>
    <div class="modal-actions">
      <button class="act-btn act-primary" onclick="copyFull()">
        <svg viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M11 5V3a1 1 0 00-1-1H3a1 1 0 00-1 1v7a1 1 0 001 1h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Copy Full JSON
      </button>
      <button class="act-btn act-secondary" onclick="copyTimestamps()">
        <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3.5l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Copy Timestamps Only
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── Constants ──────────────────────────────────────────
const STORE_KEY = 'cutmark_v1';

// ── State ──────────────────────────────────────────────
const S = {
  cuts: [],          // [{time, id}] sorted by time
  duration: 0,
  filename: '',
  fps: 30,
  fpsDetected: false,
  blobUrl: null,
  rafId: null,
  scrubbing: false,
  previewEnd: null,  // null = no preview, number = stop time
  previewRowId: null,
};

// ── DOM ────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const videoEl    = $('video');
const fileInput  = $('file-input');
const tlTrack    = $('tl-track');
const tlFill     = $('tl-fill');
const tlPFill    = $('tl-pfill');
const tlThumb    = $('tl-thumb');
const tlWrap     = $('tl-wrap');
const timeCur    = $('time-cur');
const timeDur    = $('time-dur');
const playIcon   = $('play-icon');
const playFlash  = $('play-flash');
const flashIcon  = $('flash-icon');
const emptyState = $('empty-state');
const clipsList  = $('clips-list');
const clipsBadge = $('clips-badge');
const undoBtn    = $('undo-btn');
const fpsBadge   = $('fps-badge');
const saveDot    = $('save-dot');
const previewBar = $('preview-bar');
const previewLbl = $('preview-label');
const speedSel   = $('speed-select');

const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
if (isMobile) $('kb-hint').style.display = 'none';

// ── Persistence ────────────────────────────────────────
function saveSession() {
  if (!S.filename || !S.duration) return;
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      filename: S.filename,
      duration: S.duration,
      fps: S.fps,
      fpsDetected: S.fpsDetected,
      cuts: S.cuts,
      savedAt: Date.now(),
    }));
    flashSaveDot();
  } catch(e) { /* storage full – silently ignore */ }
}

function loadSavedSession() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    // Expire sessions older than 7 days
    if (Date.now() - data.savedAt > 7 * 86400000) {
      localStorage.removeItem(STORE_KEY);
      return null;
    }
    return data;
  } catch { return null; }
}

function clearSession() {
  localStorage.removeItem(STORE_KEY);
  saveDot.classList.remove('visible');
}

function dismissRestore() {
  clearSession();
  $('resume-card').classList.add('hidden');
}

let _saveDotTimer = null;
function flashSaveDot() {
  saveDot.classList.add('visible');
  clearTimeout(_saveDotTimer);
  _saveDotTimer = setTimeout(() => saveDot.classList.remove('visible'), 2500);
}

// On page load — check for saved session
window.addEventListener('DOMContentLoaded', () => {
  const saved = loadSavedSession();
  if (saved && saved.cuts && saved.cuts.length > 0) {
    const card = $('resume-card');
    const age = Math.round((Date.now() - saved.savedAt) / 60000);
    const ageStr = age < 60 ? age + 'm ago' : Math.round(age/60) + 'h ago';
    $('resume-sub').textContent = saved.filename + ' \u00b7 ' + saved.cuts.length + ' cut' + (saved.cuts.length!==1?'s':'') + ' \u00b7 ' + ageStr;
    card.classList.remove('hidden');
    // Store for restore attempt
    window._pendingRestore = saved;
  }
});

// ── Upload ─────────────────────────────────────────────
const uploadCard = $('upload-card');
uploadCard.addEventListener('click', () => fileInput.click());
['dragover','dragenter'].forEach(ev =>
  uploadCard.addEventListener(ev, e => { e.preventDefault(); uploadCard.classList.add('over'); })
);
['dragleave','dragend'].forEach(ev =>
  uploadCard.addEventListener(ev, () => uploadCard.classList.remove('over'))
);
uploadCard.addEventListener('drop', e => {
  e.preventDefault(); uploadCard.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) loadVideo(f);
});
fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadVideo(f);
  fileInput.value = '';
});

function loadVideo(file) {
  // Cleanup previous blob URL
  if (S.blobUrl) { URL.revokeObjectURL(S.blobUrl); S.blobUrl = null; }
  stopRAF();
  cancelPreview();
  videoEl.pause();
  videoEl.removeAttribute('src');
  videoEl.load();

  // Reset state
  S.cuts = []; S.duration = 0; S.fps = 30; S.fpsDetected = false;
  videoEl.playbackRate = 1;
  speedSel.value = '1';
  speedSel.classList.remove('fast');
  fpsBadge.textContent = '\u2014';
  renderClips();

  S.filename = file.name;
  S.blobUrl = URL.createObjectURL(file);
  videoEl.src = S.blobUrl;
  $('topbar-file').textContent = file.name;

  videoEl.addEventListener('loadedmetadata', () => {
    S.duration = videoEl.duration;
    timeDur.textContent = fmtTime(S.duration);
    setVideoHeight();
    startFPSDetect();

    // Attempt restore if filename + duration match
    const pr = window._pendingRestore;
    if (pr && pr.filename === file.name && Math.abs(pr.duration - S.duration) < 0.5) {
      S.cuts = pr.cuts.map(c => ({ ...c })); // deep copy
      S.fps = pr.fps || 30;
      S.fpsDetected = pr.fpsDetected || false;
      if (S.fpsDetected) fpsBadge.textContent = S.fps + ' fps';
      renderClips();
      showToast(S.cuts.length + ' cut' + (S.cuts.length !== 1 ? 's' : '') + ' restored \u2713');
    } else if (pr && pr.filename !== file.name) {
      // Different video — clear saved session
      clearSession();
    }
    window._pendingRestore = null;
    $('resume-card').classList.add('hidden');

    switchToPlayer();
  }, { once: true });

  videoEl.addEventListener('error', () =>
    showToast('Could not load \u2014 try another format')
  , { once: true });
}

// ── FPS detection ──────────────────────────────────────
function startFPSDetect() {
  if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
    let last = null, samples = [];
    const cb = (_, meta) => {
      if (last !== null) {
        const d = meta.mediaTime - last;
        if (d > 0.004 && d < 0.15) samples.push(d);
        if (samples.length >= 8) {
          const avg = samples.slice(0, 8).reduce((a, b) => a + b, 0) / 8;
          const raw = 1 / avg;
          // Snap to nearest known frame rate to avoid eg. "31fps" artefacts
          const KNOWN = [10,12,15,18,20,23.976,24,25,29.97,30,48,50,59.94,60,90,120,240];
          const det = KNOWN.reduce((a, b) => Math.abs(b - raw) < Math.abs(a - raw) ? b : a);
          if (det >= 10) {
            S.fps = det; S.fpsDetected = true;
            fpsBadge.textContent = det + ' fps';
            saveSession();
          }
          return;
        }
      }
      last = meta.mediaTime;
      videoEl.requestVideoFrameCallback(cb);
    };
    videoEl.requestVideoFrameCallback(cb);
  } else {
    fpsBadge.textContent = '30 fps';
  }
}

// ── Video sizing ───────────────────────────────────────
function setVideoHeight() {
  const wrap = $('video-wrap');
  const aspect = (videoEl.videoWidth && videoEl.videoHeight)
    ? videoEl.videoWidth / videoEl.videoHeight : 16 / 9;
  const maxH = Math.floor(window.innerHeight * 0.38);
  const natH = Math.floor(window.innerWidth / aspect);
  wrap.style.height = Math.max(100, Math.min(natH, maxH)) + 'px';
}
window.addEventListener('resize', () => { if (S.duration) setVideoHeight(); });
window.addEventListener('orientationchange', () =>
  setTimeout(() => { if (S.duration) setVideoHeight(); }, 300)
);

// ── Screen transitions ─────────────────────────────────
function switchToPlayer() {
  const up = $('screen-upload'), pl = $('screen-player');
  up.classList.remove('active');
  up.style.transform = 'translateY(-26px)';
  up.style.opacity = '0';
  pl.classList.add('entering');
  requestAnimationFrame(() => {
    pl.classList.add('active');
    requestAnimationFrame(() => pl.classList.remove('entering'));
  });
}

function resetToUpload() {
  const up = $('screen-upload'), pl = $('screen-player');
  videoEl.pause();
  stopRAF();
  cancelPreview();
  closeExport();
  pl.classList.remove('active');
  up.style.transform = '';
  up.style.opacity = '';
  up.classList.add('active');
}

// ── RAF loop ───────────────────────────────────────────
function startRAF() {
  if (S.rafId) return;
  const tick = () => { updateTimeUI(); S.rafId = requestAnimationFrame(tick); };
  S.rafId = requestAnimationFrame(tick);
}
function stopRAF() {
  if (S.rafId) { cancelAnimationFrame(S.rafId); S.rafId = null; }
}

function updateTimeUI() {
  if (S.scrubbing) return;
  const t = videoEl.currentTime, d = S.duration || 1;
  timeCur.textContent = fmtTime(t);
  const pct = (t / d * 100).toFixed(4);
  tlFill.style.width = pct + '%';
  tlThumb.style.left = pct + '%';
}

videoEl.addEventListener('play', () => { startRAF(); setPlayIcon(false); });
videoEl.addEventListener('pause', () => { stopRAF(); updateTimeUI(); setPlayIcon(true); });
videoEl.addEventListener('ended', () => { stopRAF(); updateTimeUI(); setPlayIcon(true); cancelPreview(); });
videoEl.addEventListener('seeking', () => { if (!S.scrubbing && _stepTarget === null) updateTimeUI(); });

// Preview stop — use frame-accurate rVFC when available, else timeupdate fallback
function _schedulePreviewCheck() {
  if (S.previewEnd === null) return;
  if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
    videoEl.requestVideoFrameCallback((_, meta) => {
      if (S.previewEnd === null) return;
      if (meta.mediaTime >= S.previewEnd) {
        videoEl.pause();
        videoEl.currentTime = S.previewEnd;
        cancelPreview();
      } else {
        _schedulePreviewCheck(); // keep watching
      }
    });
  }
  // timeupdate fallback is registered permanently below
}
videoEl.addEventListener('timeupdate', () => {
  if (S.previewEnd !== null && videoEl.currentTime >= S.previewEnd) {
    videoEl.pause();
    videoEl.currentTime = S.previewEnd; // snap exactly to cut point
    cancelPreview();
  }
});

function setPlayIcon(paused) {
  const p = '<path d="M8 5v14l11-7z"/>';
  const pa = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  playIcon.innerHTML = paused ? p : pa;
  flashIcon.innerHTML = paused
    ? '<path d="M8 5v14l11-7z" fill="white"/>'
    : '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="white"/>';
}

// ── Play / Pause ───────────────────────────────────────
$('tap-layer').addEventListener('click', togglePlay);
function togglePlay() {
  cancelPreview();
  if (videoEl.paused) videoEl.play().catch(() => {});
  else videoEl.pause();
  playFlash.classList.remove('pop');
  void playFlash.offsetWidth;
  playFlash.classList.add('pop');
}

// ── Clip preview playback ──────────────────────────────
function previewClip(startTime, endTime, rowId) {
  cancelPreview(); // clear any existing
  // Clamp end to duration
  const clampedEnd = Math.min(endTime, S.duration);
  S.previewEnd = clampedEnd;
  S.previewRowId = rowId;
  videoEl.currentTime = startTime;
  videoEl.play().catch(() => {});
  _schedulePreviewCheck();

  // Highlight the row
  document.querySelectorAll('.clip-row').forEach(r => r.classList.remove('previewing'));
  const row = document.querySelector('[data-rowid="' + rowId + '"]');
  if (row) row.classList.add('previewing');

  // Show preview bar
  previewLbl.textContent = 'Previewing clip ' + rowId + '  \u2192  tap to stop';
  previewBar.classList.add('active');

  // Show green segment on timeline
  const d = S.duration || 1;
  tlPFill.style.display = 'block';
  tlPFill.style.left = (startTime / d * 100).toFixed(4) + '%';
  tlPFill.style.width = ((clampedEnd - startTime) / d * 100).toFixed(4) + '%';
}

function cancelPreview() {
  S.previewEnd = null;
  S.previewRowId = null;
  previewBar.classList.remove('active');
  tlPFill.style.display = 'none';
  document.querySelectorAll('.clip-row').forEach(r => r.classList.remove('previewing'));
}

// Tapping preview bar stops it
previewBar.addEventListener('click', () => { videoEl.pause(); cancelPreview(); });

// ── Scrubbing ──────────────────────────────────────────
function scrubStart(cx) {
  cancelPreview();
  S.scrubbing = true;
  tlFill.style.transition = 'none';
  tlThumb.style.transition = 'none';
  scrubMove(cx);
}
function scrubMove(cx) {
  if (!S.scrubbing) return;
  const r = tlTrack.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (cx - r.left) / r.width));
  const t = ratio * S.duration;
  videoEl.currentTime = t;
  timeCur.textContent = fmtTime(t);
  const pct = (ratio * 100).toFixed(4);
  tlFill.style.width = pct + '%';
  tlThumb.style.left = pct + '%';
}
function scrubEnd() {
  if (!S.scrubbing) return;
  S.scrubbing = false;
  tlFill.style.transition = '';
  tlThumb.style.transition = '';
}
tlWrap.addEventListener('mousedown', e => { e.preventDefault(); scrubStart(e.clientX); });
document.addEventListener('mousemove', e => { if (S.scrubbing) scrubMove(e.clientX); });
document.addEventListener('mouseup', scrubEnd);
tlWrap.addEventListener('touchstart', e => { e.preventDefault(); scrubStart(e.touches[0].clientX); }, { passive: false });
tlWrap.addEventListener('touchmove', e => { e.preventDefault(); scrubMove(e.touches[0].clientX); }, { passive: false });
tlWrap.addEventListener('touchend', scrubEnd, { passive: true });
tlWrap.addEventListener('touchcancel', scrubEnd, { passive: true });

// ── Transport ──────────────────────────────────────────
// _stepTarget tracks where we intend to be during rapid frame steps.
// videoEl.currentTime is async — reads can return stale values mid-seek.
let _stepTarget = null;

function seek(d) {
  cancelPreview();
  _stepTarget = null;
  videoEl.currentTime = Math.max(0, Math.min(S.duration, videoEl.currentTime + d));
  updateTimeUI();
}

function stepFrame(dir) {
  cancelPreview();
  videoEl.pause();
  // Use tracked target if available, else current time
  const base = _stepTarget !== null ? _stepTarget : videoEl.currentTime;
  // Frame size + tiny epsilon when going forward ensures we always cross
  // the frame boundary even on compressed video that quantises to keyframes.
  const frameSz = 1 / S.fps;
  const eps = dir > 0 ? 0.002 : 0; // 2ms nudge forward only
  const next = Math.max(0, Math.min(S.duration, base + dir * frameSz + eps));
  _stepTarget = next;
  videoEl.currentTime = next;
  // Update UI immediately so it feels instant
  timeCur.textContent = fmtTime(next);
  const pct = (next / (S.duration || 1) * 100).toFixed(4);
  tlFill.style.width = pct + '%';
  tlThumb.style.left = pct + '%';
}

// When seek settles, clear the step target and sync UI
videoEl.addEventListener('seeked', () => {
  if (_stepTarget !== null) {
    // If browser snapped us (keyframe) — clear target, sync display
    _stepTarget = null;
  }
  if (!S.scrubbing) updateTimeUI();
});
function onSpeedChange(sel) {
  const spd = parseFloat(sel.value);
  videoEl.playbackRate = spd;
  sel.classList.toggle('fast', spd !== 1);
}

// ── Mark cut ───────────────────────────────────────────
function markCut(evt) {
  cancelPreview();
  const t = videoEl.currentTime;
  // Reject if too close to existing cut (within 1 frame)
  if (S.cuts.some(c => Math.abs(c.time - t) < 1 / S.fps)) {
    showToast('Too close to an existing cut');
    return;
  }
  S.cuts.push({ time: t, id: Date.now() + Math.random() });
  S.cuts.sort((a, b) => a.time - b.time);

  // Ripple
  const btn = $('mark-btn');
  if (evt) {
    const rc = btn.getBoundingClientRect();
    const cx = (evt.touches ? evt.touches[0].clientX : evt.clientX) - rc.left;
    const cy = (evt.touches ? evt.touches[0].clientY : evt.clientY) - rc.top;
    const rp = document.createElement('span');
    rp.className = 'mark-ripple';
    const sz = Math.max(rc.width, rc.height);
    rp.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;left:' + (cx - sz / 2) + 'px;top:' + (cy - sz / 2) + 'px';
    btn.appendChild(rp);
    setTimeout(() => rp.remove(), 500);
  }
  btn.classList.remove('pulse');
  void btn.offsetWidth;
  btn.classList.add('pulse');

  renderClips();
  saveSession();
  showToast('Cut ' + S.cuts.length + ' \u2014 ' + fmtTime(t));
}

function undoLast() {
  if (!S.cuts.length) return;
  cancelPreview();
  const rm = S.cuts.pop();
  renderClips();
  saveSession();
  showToast('Removed \u2014 ' + fmtTime(rm.time));
}

function deleteCut(id) {
  cancelPreview();
  const rm = S.cuts.find(c => c.id === id);
  S.cuts = S.cuts.filter(c => c.id !== id);
  renderClips();
  saveSession();
  if (rm) showToast('Removed \u2014 ' + fmtTime(rm.time));
}

// ── Render clips ───────────────────────────────────────
function renderClips() {
  // Clear notches
  tlTrack.querySelectorAll('.tl-notch').forEach(n => n.remove());

  const n = S.cuts.length, cc = n + 1;
  clipsBadge.textContent = cc + (cc === 1 ? ' clip' : ' clips');
  undoBtn.disabled = n === 0;

  if (n === 0) {
    emptyState.style.display = 'flex';
    clipsList.innerHTML = '';
    return;
  }
  emptyState.style.display = 'none';

  // Notches
  S.cuts.forEach(c => {
    const el = document.createElement('div');
    el.className = 'tl-notch';
    el.style.left = (c.time / S.duration * 100).toFixed(4) + '%';
    tlTrack.appendChild(el);
  });

  const clips = buildClips();
  const frag = document.createDocumentFragment();

  clips.forEach((clip, i) => {
    const isFinal = i === clips.length - 1;
    const rowId = clip.index;
    const row = document.createElement('div');
    row.className = 'clip-row';
    row.dataset.rowid = rowId;

    row.innerHTML =
      '<div class="clip-main" data-start="' + clip.start + '" data-end="' + clip.end + '" data-rowid="' + rowId + '">' +
        '<div class="clip-num">' + clip.index + '</div>' +
        '<div class="clip-info">' +
          '<div class="clip-time">' + fmtTime(clip.start) + ' \u2192 ' + (isFinal ? fmtTime(S.duration) : fmtTime(clip.end)) + '</div>' +
          '<div class="clip-dur">' + fmtDur(clip.duration) + '</div>' +
        '</div>' +
        '<svg class="clip-play-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 5.5l5 2.5-5 2.5V5.5z" fill="currentColor"/></svg>' +
      '</div>' +
      (!isFinal
        ? '<button class="clip-del" data-id="' + S.cuts[i].id + '" aria-label="Remove cut">' +
            '<svg viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V2h4v2M7 7v5M9 7v5M4 4l.9 9a1 1 0 001 .9h4.2a1 1 0 001-.9L12 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</button>'
        : '');
    frag.appendChild(row);
  });

  clipsList.innerHTML = '';
  clipsList.appendChild(frag);

  // Delegate events
  clipsList.querySelectorAll('.clip-main').forEach(el => {
    el.addEventListener('click', () => {
      const s = parseFloat(el.dataset.start);
      const e = parseFloat(el.dataset.end);
      const rid = parseInt(el.dataset.rowid);
      // If same clip being previewed, cancel it
      if (S.previewRowId === rid) { videoEl.pause(); cancelPreview(); return; }
      previewClip(s, e, rid);
    });
  });
  clipsList.querySelectorAll('.clip-del').forEach(el => {
    el.addEventListener('click', ev => { ev.stopPropagation(); deleteCut(parseFloat(el.dataset.id)); });
  });
}

// ── Data ───────────────────────────────────────────────
function buildClips() {
  const clips = [];
  let prev = 0;
  S.cuts.forEach((c, i) => {
    clips.push({ index: i + 1, start: prev, end: c.time, duration: c.time - prev });
    prev = c.time;
  });
  clips.push({ index: S.cuts.length + 1, start: prev, end: S.duration, duration: S.duration - prev });
  return clips;
}

function buildExportData() {
  const clips = buildClips();
  const durs = clips.map(c => c.duration);
  return {
    video: {
      filename: S.filename,
      duration: r3(S.duration),
      durationFormatted: fmtTime(S.duration),
      fps: S.fps,
      fpsDetected: S.fpsDetected,
    },
    cuts: S.cuts.map((c, i) => ({
      index: i + 1,
      time: r3(c.time),
      timecode: fmtTime(c.time),
    })),
    clips: clips.map(c => ({
      index: c.index,
      start: r3(c.start),
      end: r3(c.end),
      startTimecode: fmtTime(c.start),
      endTimecode: fmtTime(c.end),
      duration: r3(c.duration),
      durationFormatted: fmtDur(c.duration),
    })),
    summary: {
      totalCuts: S.cuts.length,
      totalClips: clips.length,
      avgClipDuration: r3(durs.reduce((a, b) => a + b, 0) / durs.length),
      shortestClip: r3(Math.min(...durs)),
      longestClip: r3(Math.max(...durs)),
    },
    exportedAt: new Date().toISOString(),
  };
}

// ── Export modal ───────────────────────────────────────
function openExport() {
  if (!S.cuts.length) { showToast('Mark at least one cut first'); return; }
  const data = buildExportData();
  $('json-box').innerHTML = syntaxHL(JSON.stringify(data, null, 2));
  $('modal-stats').textContent = data.summary.totalCuts + ' cuts \u00b7 ' + data.summary.totalClips + ' clips \u00b7 avg ' + fmtDur(data.summary.avgClipDuration);
  $('modal').classList.add('open');
}
function closeExport() { $('modal').classList.remove('open'); }
function modalBgClose(e) { if (e.target === $('modal')) closeExport(); }

async function clipWrite(text) {
  try { await navigator.clipboard.writeText(text); }
  catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    Object.assign(ta.style, { position: 'fixed', opacity: '0', pointerEvents: 'none' });
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}
async function copyFull() {
  await clipWrite(JSON.stringify(buildExportData(), null, 2));
  showToast('Full JSON copied \u2713');
}
async function copyTimestamps() {
  await clipWrite(JSON.stringify(S.cuts.map(c => r3(c.time))));
  showToast('Timestamps copied \u2713');
}

function syntaxHL(j) {
  return j
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(?:[^"\\]|\\.)*"(\s*:)?|\b(?:true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g, m => {
      if (/^"/.test(m)) return '<span class="' + (/:$/.test(m) ? 'jk' : 'js') + '">' + m + '</span>';
      if (/true|false/.test(m)) return '<span class="jb">' + m + '</span>';
      return '<span class="jn">' + m + '</span>';
    });
}

// ── Keyboard ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ($('modal').classList.contains('open')) { if (e.key === 'Escape') closeExport(); return; }
  if (!$('screen-player').classList.contains('active')) return;
  if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
  const k = e.key;
  if (k === ' ')           { e.preventDefault(); togglePlay(); }
  else if (k === 'm' || k === 'M') { e.preventDefault(); markCut(null); }
  else if (k === ',')      { e.preventDefault(); stepFrame(-1); }
  else if (k === '.')      { e.preventDefault(); stepFrame(1); }
  else if (k === 'ArrowLeft')  { e.preventDefault(); seek(-1); }
  else if (k === 'ArrowRight') { e.preventDefault(); seek(1); }
  else if (k === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undoLast(); }
  else if (k === 'Escape') { cancelPreview(); }
});

// ── Toast ──────────────────────────────────────────────
let _tt = null;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Utils ──────────────────────────────────────────────
function fmtTime(s) {
  if (!isFinite(s) || s < 0) return '00:00.000';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  const ms = Math.floor((s % 1) * 1000);
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0') + '.' + String(ms).padStart(3, '0');
}
function fmtDur(s) {
  if (!isFinite(s) || s < 0) return '0.000s';
  if (s < 60) return s.toFixed(3) + 's';
  return Math.floor(s / 60) + 'm ' + Math.floor(s % 60) + 's';
}
function r3(n) { return isFinite(n) ? Math.round(n * 1000) / 1000 : 0; }

// Block iOS pull-to-refresh
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
</script>
